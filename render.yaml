services:
  - type: web
    name: real-ielts-prep-backend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npx ts-node -P tsconfig.seed.json prisma/seed-deploy.ts && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://real-ielts.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: real-ielts-prep-db
          property: connectionString

databases:
  - name: real-ielts-prep-db
    plan: free
